<style>
/* ===== FONTS (SukhumvitSet) ===== */
@font-face{font-family:'Sukhumvit';src:url('assets/fonts/SukhumvitSet-Light.ttf') format('truetype');font-weight:300;font-display:swap}
@font-face{font-family:'Sukhumvit';src:url('assets/fonts/SukhumvitSet-Text.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'Sukhumvit';src:url('assets/fonts/SukhumvitSet-Medium.ttf') format('truetype');font-weight:500;font-display:swap}
@font-face{font-family:'Sukhumvit';src:url('assets/fonts/SukhumvitSet-SemiBold.ttf') format('truetype');font-weight:600;font-display:swap}
@font-face{font-family:'Sukhumvit';src:url('assets/fonts/SukhumvitSet-Bold.ttf') format('truetype');font-weight:700;font-display:swap}

/* ===== TOKENS (blue + gold royal palette, sampled จากเว็บใหม่ qscbc.org) ===== */
:root{
  --ink:#1E3F4E;          /* deep blue-grey — หัวข้อ/ตัวอักษร */
  --ink-soft:#5C6E76;     /* ตัวอักษรรอง */
  --teal:#2C8FB1;         /* ฟ้าเทอร์คอยซ์ (อักษรพระนามาภิไธย ส) */
  --teal-deep:#1F6E8C;
  --sky:#BCD7EF;          /* ฟ้าอ่อน (พื้น) */
  --sky-soft:#EAF3FB;     /* ฟ้าอ่อนมาก */
  --gold:#C29A4E;         /* ทอง */
  --gold-soft:#DDB473;
  --gold-grad:linear-gradient(90deg,#BC8E3C 0%,#EAD79C 52%,#C49A4E 100%);
  --gold-grad-v:linear-gradient(180deg,#EAD79C 0%,#C49A4E 55%,#A9802F 100%);
  --cream:#FBF8F1;        /* ครีมอบอุ่นเข้ากับทอง */
  --line:#E6E0D5;
  --white:#fff;
  --wrap:1180px;
  --pad:clamp(20px,5vw,40px);
  --radius:14px;
  --shadow-sm:0 2px 14px rgba(30,63,78,.08);
  --shadow-md:0 16px 44px rgba(30,63,78,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Sukhumvit',-apple-system,'Segoe UI',sans-serif;color:var(--ink);background:var(--white);
  line-height:1.65;font-weight:400;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body.lang-en{line-height:1.6}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--wrap);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
.eyebrow{font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600}
.gold-line{width:56px;height:3px;border-radius:3px;background:var(--gold-grad)}
h1,h2,h3{font-weight:300;line-height:1.22;color:var(--ink);letter-spacing:-.01em}
.section{padding:clamp(54px,8vw,100px) 0}
.section-head{max-width:720px;margin:0 auto clamp(32px,5vw,54px);text-align:center}
.section-head .gold-line{margin:18px auto 0}
.section-head h2{font-size:clamp(1.7rem,4.4vw,2.6rem);margin-top:14px}
.section-head p{color:var(--ink-soft);margin-top:14px;font-size:1.05rem}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5em;font-family:inherit;
  font-weight:600;font-size:1rem;cursor:pointer;border:none;padding:13px 26px;border-radius:999px;
  white-space:nowrap;min-width:0;transition:transform .2s,box-shadow .2s,background .2s,color .2s}
.btn-teal{background:var(--teal);color:#fff;box-shadow:0 10px 26px rgba(44,143,177,.3)}
.btn-teal:hover{transform:translateY(-2px);background:var(--teal-deep);box-shadow:0 14px 32px rgba(44,143,177,.4)}
.btn-gold{background:var(--gold-grad);color:#553f12}
.btn-gold:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal)}
.btn-lg{padding:16px 34px;font-size:1.06rem}

/* ===== TOP BAR ===== */
.topbar{background:var(--ink);color:#c7d3d8;font-size:.8rem}
.topbar .wrap{display:flex;justify-content:space-between;align-items:center;gap:12px;padding-top:8px;padding-bottom:8px}
.topbar .org{letter-spacing:.03em}
.topbar .org b{color:var(--gold-soft);font-weight:600}
.topbar .util{display:flex;align-items:center;gap:18px;flex:none}
.topbar .util a{opacity:.9;display:flex;align-items:center;gap:6px}
.topbar .util a:hover{opacity:1;color:#fff}
.topbar .util svg{width:13px;height:13px}
.langsw{display:inline-flex;border:1px solid rgba(255,255,255,.25);border-radius:999px;overflow:hidden}
.langsw button{background:none;border:none;color:#c7d3d8;font-family:inherit;font-weight:600;
  font-size:.74rem;padding:3px 11px;cursor:pointer;transition:.2s}
.langsw button.on{background:var(--gold-grad);color:#4a360f}

/* ===== HEADER / MEGA MENU ===== */
header{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);transition:box-shadow .3s}
header.scrolled{box-shadow:var(--shadow-sm)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-top:9px;padding-bottom:9px}
.brand{display:flex;align-items:center;gap:13px;min-width:0}
.brand img{height:58px;width:auto}
.brand .bt{line-height:1.18;min-width:0}
.brand .bt b{display:block;font-weight:600;font-size:.92rem;color:var(--ink)}
.brand .bt span{display:block;font-size:.68rem;letter-spacing:.02em;color:var(--ink-soft)}
.menu{display:flex;align-items:center;gap:4px}
.menu>li{position:relative;list-style:none}
.menu>li>a,.menu>li>button{display:inline-flex;align-items:center;gap:5px;font-family:inherit;
  font-size:.95rem;font-weight:500;color:var(--ink);background:none;border:none;cursor:pointer;
  padding:10px 13px;border-radius:8px;transition:.18s}
.menu>li>a:hover,.menu>li>button:hover,.menu>li.open>button{color:var(--teal);background:var(--sky-soft)}
.menu>li>button svg{width:13px;height:13px;transition:transform .2s}
.menu>li.open>button svg{transform:rotate(180deg)}
.dropdown{position:absolute;top:calc(100% + 6px);left:0;min-width:286px;background:#fff;
  border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-md);padding:8px;
  opacity:0;visibility:hidden;transform:translateY(-8px);transition:.2s;z-index:5}
.menu>li.open .dropdown{opacity:1;visibility:visible;transform:translateY(0)}
.dropdown a{display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:8px;
  font-size:.92rem;font-weight:500;color:var(--ink);transition:.15s}
.dropdown a:hover{background:var(--sky-soft);color:var(--teal)}
.dropdown a .di{flex:none;width:30px;height:30px;border-radius:7px;background:var(--sky-soft);
  display:flex;align-items:center;justify-content:center;color:var(--teal)}
.dropdown a .di svg{width:16px;height:16px}
.nav-cta{display:flex;align-items:center;gap:10px}
.burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px}
.burger span{width:26px;height:2.5px;background:var(--ink);border-radius:2px;transition:.25s}

/* ===== HERO ===== */
.hero{position:relative;background:linear-gradient(180deg,var(--sky-soft),#fff);overflow:hidden}
.hero .bg{position:absolute;inset:0;background:url('assets/img/hero-sky.jpg') center/cover no-repeat;opacity:.5}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(234,243,251,.4),#fff 92%)}
.hero-inner{position:relative;z-index:2;text-align:center;max-width:880px;margin:0 auto;
  padding-top:clamp(54px,8vw,96px);padding-bottom:clamp(54px,8vw,96px)}
.hero .emblem{height:clamp(96px,15vw,134px);margin:0 auto 22px;filter:drop-shadow(0 8px 20px rgba(30,63,78,.18))}
.hero .eyebrow{display:block}
.hero h1{font-size:clamp(2.2rem,6vw,3.8rem);margin-top:14px;font-weight:300}
.hero h1 .em{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:600}
.hero .lead{font-size:clamp(1.04rem,2.4vw,1.2rem);color:var(--ink-soft);margin:20px auto 0;max-width:40em}
.hero-cta{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:32px}
.hero-tags{display:flex;flex-wrap:wrap;gap:10px 22px;justify-content:center;margin-top:26px;
  color:var(--ink-soft);font-size:.92rem}
.hero-tags span{display:flex;align-items:center;gap:7px}
.hero-tags svg{width:16px;height:16px;color:var(--teal)}

/* ===== IN MEMORIAM (official banner, verbatim) ===== */
.memoriam{background:var(--cream);padding:clamp(26px,4vw,40px) 0}
.memoriam .frame{max-width:980px;margin:0 auto;border:1px solid var(--line);border-radius:14px;
  overflow:hidden;box-shadow:var(--shadow-sm)}
.memoriam img{width:100%;display:block}

/* ===== TRUST STRIP ===== */
.trust{background:var(--ink);color:#fff}
.trust .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;padding-top:30px;padding-bottom:30px}
.trust .item{display:flex;gap:13px;align-items:flex-start}
.trust .ic{flex:none;width:44px;height:44px;border-radius:11px;background:rgba(194,154,78,.18);
  display:flex;align-items:center;justify-content:center;color:var(--gold-soft)}
.trust .ic svg{width:22px;height:22px}
.trust b{display:block;font-weight:600;font-size:1rem}
.trust span{font-size:.85rem;color:#aebcc2}

/* ===== ABOUT ===== */
.about{background:#fff}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(30px,5vw,64px);align-items:center}
.about-media{position:relative;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);aspect-ratio:4/3.1}
.about-media img{width:100%;height:100%;object-fit:cover}
.about-media .badge{position:absolute;left:18px;bottom:18px;background:rgba(255,255,255,.95);
  border-radius:12px;padding:10px 16px;box-shadow:var(--shadow-sm);border-left:3px solid var(--gold)}
.about-media .badge b{display:block;font-weight:700;color:var(--teal);font-size:1.5rem;line-height:1}
.about-media .badge span{font-size:.78rem;color:var(--ink-soft)}
.about-copy h2{font-size:clamp(1.7rem,4vw,2.5rem)}
.about-copy .lead{color:var(--ink-soft);margin-top:16px}
.vm{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:26px}
.vm .card{background:var(--sky-soft);border-radius:12px;padding:20px}
.vm .card h3{font-size:1.1rem;font-weight:600;color:var(--teal);display:flex;align-items:center;gap:8px}
.vm .card h3 svg{width:18px;height:18px}
.vm .card p{font-size:.92rem;color:var(--ink-soft);margin-top:8px}

/* ===== SERVICES (7 units) ===== */
.services{background:var(--sky-soft)}
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.svc{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:24px 20px;
  transition:transform .22s,box-shadow .22s}
.svc:hover{transform:translateY(-5px);box-shadow:var(--shadow-md)}
.svc .ic{width:52px;height:52px;border-radius:13px;background:var(--gold-grad-v);
  display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:14px}
.svc .ic svg{width:26px;height:26px}
.svc h3{font-size:1.06rem;font-weight:600;color:var(--ink)}
.svc p{font-size:.88rem;color:var(--ink-soft);margin-top:7px}
.svc.wide{grid-column:span 2;background:linear-gradient(120deg,var(--teal),var(--teal-deep));border:none;color:#fff;
  display:flex;flex-direction:column;justify-content:center}
.svc.wide h3{color:#fff;font-size:1.3rem}
.svc.wide p{color:rgba(255,255,255,.86)}
.svc.wide .ic{background:rgba(255,255,255,.16)}

/* ===== PROJECTS ===== */
.projects{background:#fff}
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.proj{position:relative;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);
  background:#0b2530;aspect-ratio:3/3.5;transition:transform .25s,box-shadow .25s}
.proj:hover{transform:translateY(-5px);box-shadow:var(--shadow-md)}
.proj img{width:100%;height:100%;object-fit:cover;opacity:.88;transition:.4s}
.proj:hover img{transform:scale(1.05);opacity:1}
.proj .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,50,62,.05) 35%,rgba(13,35,44,.9))}
.proj .tx{position:absolute;left:22px;right:22px;bottom:22px;color:#fff;z-index:2}
.proj .tx .k{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-soft);font-weight:600}
.proj .tx h3{color:#fff;font-weight:600;font-size:1.22rem;margin-top:4px}
.proj .tx p{font-size:.88rem;color:#dbe4e8;margin-top:6px}
.proj-more{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
.proj-more .chip{display:flex;align-items:center;gap:10px;background:var(--sky-soft);border-radius:11px;
  padding:14px 16px;font-weight:500;font-size:.92rem}
.proj-more .chip svg{width:20px;height:20px;color:var(--teal);flex:none}

/* ===== NEWS ===== */
.news{background:var(--cream)}
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.post{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  transition:transform .22s,box-shadow .22s}
.post:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.post .ph{aspect-ratio:16/9;overflow:hidden;background:var(--sky)}
.post .ph img{width:100%;height:100%;object-fit:cover}
.post .pb{padding:20px}
.post .date{font-size:.78rem;color:var(--gold);font-weight:600;letter-spacing:.04em}
.post h3{font-size:1.08rem;font-weight:600;color:var(--ink);margin-top:6px;line-height:1.4}
.post .rm{margin-top:12px;font-size:.88rem;color:var(--teal);font-weight:600;display:inline-flex;gap:5px;align-items:center}

/* ===== DONATE ===== */
.donate{background:linear-gradient(180deg,var(--sky-soft),#fff 45%)}
.donate-card{max-width:780px;margin:0 auto;background:#fff;border-radius:22px;box-shadow:var(--shadow-md);
  overflow:hidden;border:1px solid var(--line)}
.dc-head{background:var(--ink);color:#fff;padding:24px clamp(22px,4vw,38px);display:flex;
  align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.dc-head h3{color:#fff;font-weight:600;font-size:1.25rem}
.dc-head span{color:var(--gold-soft);font-size:.84rem}
.toggle{display:inline-flex;background:rgba(255,255,255,.12);border-radius:999px;padding:4px}
.toggle button{background:none;border:none;color:#cdd8dc;font-family:inherit;font-weight:600;
  font-size:.88rem;padding:9px 18px;border-radius:999px;cursor:pointer;transition:.2s;white-space:nowrap}
.toggle button.on{background:#fff;color:var(--teal)}
.dc-body{padding:clamp(24px,4vw,38px)}
.amt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.amt{border:1.6px solid var(--line);border-radius:13px;background:#fff;padding:17px 8px;text-align:center;
  cursor:pointer;transition:.18s;font-family:inherit}
.amt b{display:block;font-size:1.34rem;font-weight:700;color:var(--ink)}
.amt span{font-size:.74rem;color:var(--ink-soft)}
.amt:hover{border-color:var(--sky)}
.amt.on{border-color:var(--teal);background:var(--sky-soft);box-shadow:0 6px 16px rgba(44,143,177,.14)}
.amt.on b{color:var(--teal)}
.amt.custom{grid-column:span 3;display:flex;align-items:center;gap:10px;justify-content:center;padding:13px}
.amt.custom label{font-weight:600;color:var(--ink-soft);font-size:.94rem;white-space:nowrap}
.amt.custom .in{display:flex;align-items:center;border:1.6px solid var(--line);border-radius:10px;
  padding:8px 14px;max-width:260px;background:#fff}
.amt.custom .in:focus-within{border-color:var(--teal)}
.amt.custom .in b{font-size:1.1rem;color:var(--ink-soft);font-weight:600}
.amt.custom input{border:none;outline:none;font-family:inherit;font-size:1.18rem;font-weight:700;
  width:100%;color:var(--ink);background:none;margin-left:6px}
.impact{margin-top:16px;background:var(--cream);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;
  padding:12px 16px;font-size:.94rem;color:var(--ink);display:flex;gap:9px;align-items:center}
.impact svg{flex:none;width:20px;height:20px;color:var(--teal)}
.impact em{font-style:normal;font-weight:600;color:var(--teal)}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:span 2}
.field label{font-size:.85rem;font-weight:600;color:var(--ink-soft)}
.field input{font-family:inherit;font-size:1rem;padding:12px 14px;border:1.5px solid var(--line);
  border-radius:10px;color:var(--ink);transition:.18s}
.field input:focus{outline:none;border-color:var(--teal)}
.summary{display:flex;align-items:center;justify-content:space-between;margin-top:22px;padding:16px 20px;
  background:var(--ink);color:#fff;border-radius:12px;flex-wrap:wrap;gap:10px}
.summary .s-l span{font-size:.82rem;color:#aebcc2}
.summary .s-l b{display:block;font-size:1.55rem;font-weight:700;color:#fff}
.summary .s-l b small{font-size:.88rem;font-weight:400;color:var(--gold-soft)}
.demo-note{margin-top:14px;text-align:center;font-size:.8rem;color:var(--ink-soft)}

/* bank channels */
.channels{background:#fff;border-top:1px solid var(--line)}
.ch-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:24px;align-items:start}
.ch-card{background:var(--cream);border:1px solid var(--line);border-radius:var(--radius);padding:28px}
.ch-card h3{font-size:1.2rem;font-weight:600;display:flex;align-items:center;gap:10px}
.ch-card h3 .n{flex:none;width:30px;height:30px;border-radius:50%;background:var(--gold-grad);
  color:#553f12;font-size:.9rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.ch-card .acct{margin-top:14px;font-weight:600;color:var(--teal)}
.bank{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
.bank:last-of-type{border-bottom:none}
.bank img{width:46px;height:46px;border-radius:8px;flex:none;object-fit:cover}
.bank .b-name{font-size:.9rem;color:var(--ink-soft)}
.bank .b-no{font-weight:600;color:var(--ink)}
.ch-note{margin-top:16px;font-size:.86rem;color:var(--ink-soft);background:#fff;border:1px solid var(--line);
  border-radius:10px;padding:12px 14px}
.ch-side .mini{display:flex;gap:13px;align-items:flex-start;margin-bottom:18px}
.ch-side .mini:last-child{margin-bottom:0}
.ch-side .mini .ic{flex:none;width:40px;height:40px;border-radius:11px;background:var(--sky-soft);
  display:flex;align-items:center;justify-content:center;color:var(--teal)}
.ch-side .mini .ic svg{width:20px;height:20px}
.ch-side .mini b{font-weight:600;display:block}
.ch-side .mini span{font-size:.9rem;color:var(--ink-soft)}

/* ===== CONTACT ===== */
.contact{background:var(--sky-soft)}
.ct-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:28px;align-items:stretch}
.ct-info{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:30px}
.ct-row{display:flex;gap:13px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line)}
.ct-row:last-child{border-bottom:none}
.ct-row .ic{flex:none;width:42px;height:42px;border-radius:11px;background:var(--sky-soft);
  display:flex;align-items:center;justify-content:center;color:var(--teal)}
.ct-row .ic svg{width:20px;height:20px}
.ct-row b{display:block;font-weight:600;font-size:.95rem}
.ct-row span,.ct-row a{font-size:.92rem;color:var(--ink-soft)}
.ct-row a:hover{color:var(--teal)}
.ct-map{position:relative;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);min-height:340px;border:1px solid var(--line);background:var(--sky-soft)}
.ct-map iframe{width:100%;height:100%;min-height:340px;border:0;display:block}
.map-fallback{position:absolute;right:12px;bottom:12px;background:#fff;color:var(--teal);font-weight:600;
  font-size:.85rem;padding:9px 16px;border-radius:999px;box-shadow:var(--shadow-sm);z-index:2}
.map-fallback:hover{background:var(--teal);color:#fff}

/* ===== FOOTER ===== */
footer{background:#16323E;color:#a9bcc4;font-size:.93rem}
.f-top{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:34px;padding:clamp(44px,6vw,70px) 0 42px}
.f-brand img{height:64px;margin-bottom:14px}
.f-brand b{color:#fff;font-weight:600;display:block}
.f-brand p{margin-top:9px;max-width:36ch;font-size:.88rem}
.f-col h4{color:#fff;font-weight:600;font-size:1rem;margin-bottom:6px}
.f-col h4 + .gl{width:38px;height:2px;background:var(--gold);margin-bottom:15px;border-radius:2px}
.f-col a{display:block;padding:5px 0;color:#a9bcc4}
.f-col a:hover{color:#fff}
.f-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:11px}
.f-row svg{width:17px;height:17px;flex:none;color:var(--gold-soft);margin-top:3px}
.f-bottom{border-top:1px solid rgba(255,255,255,.1);padding:18px 0;display:flex;justify-content:space-between;
  gap:12px;flex-wrap:wrap;font-size:.8rem;color:#7e939c}
.f-bottom .demo{color:var(--gold-soft)}

/* ===== TOAST ===== */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(120px);background:var(--ink);
  color:#fff;padding:15px 22px;border-radius:13px;box-shadow:var(--shadow-md);max-width:90vw;display:flex;
  gap:12px;align-items:center;z-index:200;transition:transform .35s cubic-bezier(.2,.9,.3,1.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast svg{width:24px;height:24px;color:var(--gold-soft);flex:none}
.toast b{font-weight:600;display:block}
.toast span{font-size:.85rem;color:#cdd8dc}

/* ===== MOBILE MENU ===== */
.mobile{position:fixed;inset:0;background:rgba(22,50,62,.5);backdrop-filter:blur(3px);z-index:80;
  opacity:0;pointer-events:none;transition:.25s}
.mobile.open{opacity:1;pointer-events:all}
.mobile-panel{position:absolute;top:0;right:0;width:min(86vw,360px);height:100%;background:#fff;
  box-shadow:-10px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:.3s;display:flex;
  flex-direction:column;overflow-y:auto}
.mobile.open .mobile-panel{transform:translateX(0)}
.mobile-panel .mh{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;
  border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
.mobile-panel .mh img{height:44px}
.mobile-panel .x{background:none;border:none;font-size:1.7rem;cursor:pointer;color:var(--ink-soft);line-height:1}
.macc{border-bottom:1px solid var(--line)}
.macc>button{width:100%;display:flex;justify-content:space-between;align-items:center;background:none;
  border:none;font-family:inherit;font-size:1rem;font-weight:600;color:var(--ink);padding:15px 20px;cursor:pointer}
.macc>button svg{width:16px;height:16px;transition:transform .2s}
.macc.open>button svg{transform:rotate(180deg)}
.macc .sub{max-height:0;overflow:hidden;transition:max-height .3s;background:var(--sky-soft)}
.macc.open .sub{max-height:500px}
.macc .sub a{display:block;padding:11px 20px 11px 34px;font-size:.92rem;color:var(--ink-soft)}
.macc .sub a:hover{color:var(--teal)}
.m-cta{padding:18px 20px}
.m-cta .btn{display:flex;width:100%}

<!-- TOAST -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.5-9-9a5 5 0 019-3 5 5 0 019 3c-2 4.5-9 9-9 9z"/></svg>
  <div><b id="toastT"></b><span id="toastS"></span></div>
</div>

<script>
(function(){
  /* ---------- i18n ---------- */
  var lang = (localStorage.getItem('qscbc_lang')==='en') ? 'en' : 'th';
  function applyLang(l){
    lang=l; localStorage.setItem('qscbc_lang',l);
    document.documentElement.lang=l;
    document.body.classList.toggle('lang-en',l==='en');
    document.body.classList.toggle('lang-th',l==='th');
    document.querySelectorAll('[data-th]').forEach(function(el){
      var t=el.getAttribute('data-'+l); if(t!==null) el.textContent=t;
    });
    document.querySelectorAll('[data-ph-th]').forEach(function(el){
      var t=el.getAttribute('data-ph-'+l); if(t!==null) el.placeholder=t;
    });
    document.querySelectorAll('.langsw button').forEach(function(b){b.classList.toggle('on',b.dataset.lang===l);});
    render();
  }
  document.querySelectorAll('.langsw button').forEach(function(b){
    b.addEventListener('click',function(){applyLang(b.dataset.lang);});
  });

  /* ---------- donation ---------- */
  var state={amt:1000,freq:'once'};
  var impacts={
    th:{500:'ช่วยสมทบค่าเดินทางมาตรวจติดตามให้ผู้ป่วย',1000:'ช่วยสมทบค่าตรวจคัดกรองมะเร็งเต้านมให้ผู้ที่ขาดโอกาส',2000:'ช่วยสนับสนุนการดูแลผู้ป่วยที่บ้านพิงพัก',3000:'ช่วยสมทบทุนค่ายาและเวชภัณฑ์สำหรับการรักษา',5000:'ร่วมสร้างโอกาสการรักษาให้ผู้ป่วยที่ขาดแคลนทุนทรัพย์',10000:'ร่วมเป็นกำลังหลักสนับสนุนพันธกิจของศูนย์ฯ ตลอดทั้งปี'},
    en:{500:'helps cover a patient’s travel for follow-up visits',1000:'helps fund breast cancer screening for those in need',2000:'helps support patient care at Pink Park Village',3000:'helps fund medicine and supplies for treatment',5000:'helps open treatment access for patients in financial hardship',10000:'helps sustain the Centre’s mission throughout the year'}
  };
  var noteTxt={th:'*ตัวอย่างการนำไปใช้',en:'*illustrative use'};
  function fmt(n){return '฿'+Number(n||0).toLocaleString('en-US');}
  function render(){
    var t=fmt(state.amt);
    var freqLbl = state.freq==='monthly' ? (lang==='th'?' / เดือน':' / mo') : '';
    document.getElementById('sumTotal').innerHTML=t+(freqLbl?' <small>'+freqLbl+'</small>':'');
    var imp=document.getElementById('impact'), msg=impacts[lang][state.amt];
    if(msg){imp.style.display='flex';
      imp.querySelector('div').innerHTML='<em>'+t+'</em> '+msg+' <span style="color:var(--ink-soft);font-size:.85em">'+noteTxt[lang]+'</span>';}
    else{imp.style.display='none';}
  }
  var grid=document.getElementById('amtGrid'), custom=document.getElementById('customAmt');
  grid.querySelectorAll('.amt[data-amt]').forEach(function(b){
    b.addEventListener('click',function(){
      grid.querySelectorAll('.amt').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');custom.value='';state.amt=parseInt(b.dataset.amt,10);render();
    });
  });
  custom.addEventListener('input',function(){
    grid.querySelectorAll('.amt[data-amt]').forEach(function(x){x.classList.remove('on');});
    if(custom.value){custom.closest('.amt').classList.add('on');state.amt=parseInt(custom.value,10)||0;}
    else{state.amt=0;}
    render();
  });
  document.querySelectorAll('#freqToggle button').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('#freqToggle button').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');state.freq=b.dataset.freq;render();
    });
  });
  var toast=document.getElementById('toast'),tmr;
  document.getElementById('donateBtn').addEventListener('click',function(){
    var tt=document.getElementById('toastT'),ts=document.getElementById('toastS');
    if(!state.amt){tt.textContent=lang==='th'?'กรุณาเลือกจำนวนเงิน':'Please choose an amount';
      ts.textContent=lang==='th'?'เลือกยอดบริจาคหรือกรอกจำนวนที่ต้องการ':'Select a preset or enter a custom amount';}
    else{tt.textContent=lang==='th'?'ขอบคุณสำหรับน้ำใจ':'Thank you for your kindness';
      ts.textContent=(lang==='th'?'ยอด ':'Amount ')+fmt(state.amt)+(state.freq==='monthly'?(lang==='th'?' /เดือน':' /mo'):'')+(lang==='th'?' — นี่คือเว็บตัวอย่าง ระบบจริงจะเชื่อมต่อเมื่อใช้งาน':' — this is a demo; the live system connects on launch');}
    toast.classList.add('show');clearTimeout(tmr);tmr=setTimeout(function(){toast.classList.remove('show');},4200);
  });

  /* ---------- desktop dropdowns ---------- */
  document.querySelectorAll('.menu > li').forEach(function(li){
    var btn=li.querySelector('button'); if(!btn)return;
    btn.addEventListener('click',function(e){e.stopPropagation();
      var wasOpen=li.classList.contains('open');
      document.querySelectorAll('.menu > li').forEach(function(x){x.classList.remove('open');});
      if(!wasOpen)li.classList.add('open');
    });
    li.addEventListener('mouseenter',function(){
      document.querySelectorAll('.menu > li').forEach(function(x){x.classList.remove('open');});
      li.classList.add('open');});
    li.addEventListener('mouseleave',function(){li.classList.remove('open');});
  });
  document.addEventListener('click',function(){document.querySelectorAll('.menu > li').forEach(function(x){x.classList.remove('open');});});
  document.querySelectorAll('.dropdown a').forEach(function(a){a.addEventListener('click',function(){
    document.querySelectorAll('.menu > li').forEach(function(x){x.classList.remove('open');});});});

  /* ---------- header shadow ---------- */
  var h=document.getElementById('header');
  window.addEventListener('scroll',function(){h.classList.toggle('scrolled',window.scrollY>10);});

  /* ---------- mobile menu ---------- */
  var m=document.getElementById('mobile');
  document.getElementById('burger').addEventListener('click',function(){m.classList.add('open');});
  document.getElementById('mclose').addEventListener('click',function(){m.classList.remove('open');});
  m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('open');});
  document.querySelectorAll('.macc > button').forEach(function(b){
    if(b.classList.contains('solo')){b.addEventListener('click',function(){m.classList.remove('open');});return;}
    b.addEventListener('click',function(){b.parentElement.classList.toggle('open');});
  });
  m.querySelectorAll('.sub a, .m-cta a').forEach(function(a){a.addEventListener('click',function(){m.classList.remove('open');});});

  applyLang(lang);
})();
</script>
