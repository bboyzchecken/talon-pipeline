<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect: ลด round-trip latency ก่อน browser ดาวน์โหลด font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load font as <link> แทน CSS @import: ไม่ block render, โหลดขนาน -->
    <!-- Space Grotesk = display/Latin/ตัวเลข (ฟีลเทค) · IBM Plex Sans Thai = ไทย (วรรณยุกต์ถูกตำแหน่ง) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
      />
    </noscript>

    <!-- [LCP] Preload surface image (BG_IMAGE_1): โหลด LCP image ทันทีที่เริ่ม parse HTML -->
    <link rel="preload" as="image" href="./surface.svg" fetchpriority="high" />

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    />
    <meta name="robots" content="noindex" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Owl Day House — ใต้ดีไซน์สวย คือระบบที่โตได้" />
    <meta
      property="og:description"
      content="ส่องดูระบบที่อยู่เบื้องหลังงานออกแบบของเรา — เสร็จไว ดูแลต่อ โดยทีมคนไทย"

    <meta property="og:image" content="https://owldayhouse.com/showcase/reveal/surface.svg" />
    <meta name="theme-color" content="#1b1938" />
    <script type="module" crossorigin src="./assets/index-DGBeORj6.js"></script>
